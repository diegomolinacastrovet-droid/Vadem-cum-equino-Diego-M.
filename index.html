let favoritos =
JSON.parse(localStorage.getItem("favoritos"))
|| [];


let recientes =
JSON.parse(localStorage.getItem("recientes"))
|| [];



const resultado =
document.getElementById("resultado");



document
.getElementById("busqueda")
.addEventListener("input",buscar);



function buscar(){


let texto =
document
.getElementById("busqueda")
.value
.toLowerCase();



let lista =
medicamentos.filter(m=>

m.nombre
.toLowerCase()
.includes(texto)

);



resultado.innerHTML =
lista.map(m=>`

<div class="tarjeta"
onclick="abrirFicha('${m.nombre}')">

<div class="titulo">
${m.nombre}
</div>

<p>${m.letra}</p>

</div>

`).join("");

}



function abrirFicha(nombre){


let m =
medicamentos.find(x=>x.nombre===nombre);



guardarReciente(nombre);



let ficha =
document.getElementById("ficha");



ficha.style.display="block";



ficha.innerHTML=

`

<div class="titulo">
${m.nombre}
</div>


<div class="seccion">

<b>DOSIS</b>

<p>
${m.dosis}
</p>

</div>



<div class="seccion">

<b>INDICACIÓN</b>

<p>
${m.indicacion}
</p>

</div>



<div class="seccion">

<b>COMENTARIOS</b>

<p>
${m.comentarios}
</p>

</div>


<button class="favorito"
onclick="agregarFavorito('${m.nombre}')">

⭐ Agregar favorito

</button>


<button onclick="copiarFicha('${m.nombre}')">

📋 Copiar ficha

</button>


`;

}
function agregarFavorito(nombre){

if(!favoritos.includes(nombre)){

favoritos.push(nombre);

localStorage.setItem(
"favoritos",
JSON.stringify(favoritos)
);

alert("Guardado en favoritos ⭐");

}

}



function mostrarFavoritos(){

ocultarTodo();


let extra =
document.getElementById("extra");


let lista =
medicamentos.filter(m=>
favoritos.includes(m.nombre)
);



extra.innerHTML = `

<h2>⭐ Favoritos</h2>

${lista.map(m=>`

<div class="tarjeta"
onclick="abrirFicha('${m.nombre}')">

${m.nombre}

</div>

`).join("")}

`;

}



function guardarReciente(nombre){


recientes =
recientes.filter(x=>x!==nombre);


recientes.unshift(nombre);



if(recientes.length>10){

recientes.pop();

}



localStorage.setItem(
"recientes",
JSON.stringify(recientes)
);


}



function mostrarRecientes(){

ocultarTodo();


let extra =
document.getElementById("extra");



extra.innerHTML=`

<h2>🕒 Últimos vistos</h2>


${recientes.map(n=>`

<div class="tarjeta"
onclick="abrirFicha('${n}')">

${n}

</div>

`).join("")}

`;

}

function copiarFicha(nombre){


let m =
medicamentos.find(x=>x.nombre===nombre);



let texto=

`

${m.nombre}


DOSIS:

${m.dosis}


INDICACIÓN:

${m.indicacion}


COMENTARIOS:

${m.comentarios}

`;



navigator.clipboard.writeText(texto);


alert("Ficha copiada 📋");


}

.style.display="block";

function ingresar(){

const clave=document.getElementById("clave");
const error=document.getElementById("error");

if(clave.value==="Yibi2026"){

    error.style.display="none";

    localStorage.setItem("login","ok");

    document.getElementById("login").style.opacity="0";

    setTimeout(()=>{
        document.getElementById("login").style.display="none";
    },250);

}else{

    error.style.display="block";

    clave.value="";

    clave.focus();

    clave.style.border="2px solid red";

    setTimeout(()=>{
        clave.style.border="1px solid #ccc";
    },500);

}

}
window.onload = function() {

    if(localStorage.getItem("login")=="ok"){
        document.getElementById("login").style.display="none";
    }

    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("service-worker.js");
    }

}
